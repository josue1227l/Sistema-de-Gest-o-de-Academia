<!DOCTYPE html>
<html>
<head>
    <title>Alunos</title>
</head>
<body>

<h1>Cadastro de Alunos</h1>

<a href="/painel">Voltar</a>

<hr>

<form action="/cadastrar_aluno" method="POST">

    <input type="text" name="nome" placeholder="Nome" required>

    <input type="email" name="email" placeholder="Email" required>

    <input type="text" name="telefone" placeholder="Telefone">

    <input type="text" name="matricula" placeholder="Matrícula">

    <input type="number" step="0.01" name="peso" placeholder="Peso">

    <input type="number" step="0.01" name="altura" placeholder="Altura">

    <button type="submit">Cadastrar</button>

</form>

<hr>

{% if mensagem %}
<p>{{ mensagem }}</p>
{% endif %}

<h2>Lista de Alunos</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Nome</th>
    <th>Email</th>
    <th>Matrícula</th>
    <th>Ações</th>
</tr>

{% for aluno in alunos %}

<tr>

    <td>{{ aluno[0] }}</td>
    <td>{{ aluno[1] }}</td>
    <td>{{ aluno[2] }}</td>
    <td>{{ aluno[4] }}</td>

    <td>

        <a href="/editar_aluno/{{ aluno[0] }}">
            Editar
        </a>

        |

        <a href="/excluir_aluno/{{ aluno[0] }}">
            Excluir
        </a>

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
